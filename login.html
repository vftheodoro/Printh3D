<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printh3D Pro — Login</title>
    <link rel="icon" type="image/png" href="assets/images/logo_printh_azul.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Lucide Icons -->
    <script defer src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>

    <!-- ===== TELA DE LOGIN ===== -->
    <div class="login-wrapper">
        <div class="login-card" id="login-card">

            <!-- Logo / Marca -->
            <div class="login-logo">
                <div class="logo-icon-wrap"><img src="assets/images/logo_printh_azul.png" alt="Printh3D Logo" style="width: 42px; height: 42px;"></div>
                <h1>Printh<span>3D</span></h1>
                <p>Sistema de Gestão de Impressão 3D</p>
            </div>

            <!-- Formulário de Login -->
            <form id="login-form" autocomplete="on">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email"
                           placeholder="seu@email.com"
                           required autofocus
                           autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="login-password">Senha</label>
                    <div class="password-field">
                        <input type="password" id="login-password"
                               placeholder="••••••••"
                               required
                               autocomplete="current-password">
                        <button type="button" class="password-toggle-btn" id="toggle-password-btn" aria-label="Mostrar senha" title="Mostrar senha">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Mensagem de erro -->
                <div id="login-error" class="login-error" role="alert" aria-live="assertive"></div>
                <div id="login-feedback" class="login-info" role="status" aria-live="polite" style="display:none;"></div>

                <button type="submit" class="btn btn-primary">
                    <i data-lucide="lock"></i> Entrar
                </button>
            </form>

            <!-- Importar base de dados -->
            <div class="login-footer">
                <button class="btn btn-secondary" id="btn-import-db">
                    <i data-lucide="upload"></i> Importar Base de Dados
                </button>
                <input type="file" id="file-import-login" accept=".xlsx,.xls" hidden>
            </div>

            <!-- Dica de acesso -->
            <div class="login-info">
                Acesso padrão:<br>
                <strong>admin@printh3d.com</strong> / <strong>admin123</strong>
            </div>
        </div>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <!-- SHA-256 para hash de senhas -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/js-sha256/0.9.0/sha256.min.js"></script>
    <!-- SheetJS para manipulação de Excel -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Módulos do sistema -->
    <script defer src="js/database.js"></script>
    <script defer src="js/storage.js"></script>
    <script defer src="js/auth.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('login-form');
            const loginButton = loginForm.querySelector('button[type="submit"]');
            const passwordInput = document.getElementById('login-password');
            const togglePasswordBtn = document.getElementById('toggle-password-btn');
            const errorEl = document.getElementById('login-error');
            const feedbackEl = document.getElementById('login-feedback');
            const importBtn = document.getElementById('btn-import-db');
            const importInput = document.getElementById('file-import-login');

            let passwordVisible = false;

            function renderIcons() {
                if (typeof lucide !== 'undefined') {
                    lucide.createIcons();
                }
            }

            function showError(message) {
                if (!errorEl) return;
                errorEl.textContent = message;
                errorEl.style.display = 'block';
            }

            function clearError() {
                if (!errorEl) return;
                errorEl.textContent = '';
                errorEl.style.display = 'none';
            }

            function showFeedback(message) {
                if (!feedbackEl) return;
                feedbackEl.textContent = message;
                feedbackEl.style.display = 'block';
            }

            function hideFeedback() {
                if (!feedbackEl) return;
                feedbackEl.textContent = '';
                feedbackEl.style.display = 'none';
            }

            function setPasswordVisibility(visible) {
                passwordVisible = visible;
                passwordInput.type = visible ? 'text' : 'password';
                togglePasswordBtn.innerHTML = visible
                    ? '<i data-lucide="eye-off"></i>'
                    : '<i data-lucide="eye"></i>';
                togglePasswordBtn.setAttribute('aria-label', visible ? 'Ocultar senha' : 'Mostrar senha');
                togglePasswordBtn.setAttribute('title', visible ? 'Ocultar senha' : 'Mostrar senha');
                renderIcons();
            }

            async function bootstrapLogin() {
                loginButton.disabled = true;
                loginButton.innerHTML = '<i data-lucide="loader-2"></i> Carregando...';
                renderIcons();

                try {
                    await Storage.init();
                } catch (err) {
                    showError('Falha ao inicializar o sistema: ' + err.message);
                    return;
                }

                if (Auth.isLoggedIn()) {
                    window.location.href = 'index.html';
                    return;
                }

                loginButton.disabled = false;
                loginButton.innerHTML = '<i data-lucide="lock"></i> Entrar';
                renderIcons();
            }

            renderIcons();
            setPasswordVisibility(false);
            bootstrapLogin();

            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                hideFeedback();

                const email = document.getElementById('login-email').value.trim();
                const password = passwordInput.value;

                const result = Auth.login(email, password);

                if (result.success) {
                    window.location.href = 'index.html';
                } else {
                    showError(result.message);

                    const card = document.getElementById('login-card');
                    card.style.animation = 'none';
                    card.offsetHeight;
                    card.style.animation = 'shake 0.5s ease';
                }
            });

            togglePasswordBtn.addEventListener('click', function() {
                setPasswordVisibility(!passwordVisible);
                passwordInput.focus();
            });

            importBtn.addEventListener('click', function() {
                importInput.click();
            });

            importInput.addEventListener('change', async function(e) {
                const file = e.target.files[0];
                if (!file) return;

                clearError();
                hideFeedback();
                importBtn.disabled = true;
                importBtn.innerHTML = '<i data-lucide="loader-2"></i> Importando...';
                renderIcons();

                try {
                    await Storage.importExcel(file);
                    showFeedback('Base de dados importada com sucesso. Faça login para continuar.');
                } catch (err) {
                    showError('Erro ao importar: ' + err.message);
                } finally {
                    importBtn.disabled = false;
                    importBtn.innerHTML = '<i data-lucide="upload"></i> Importar Base de Dados';
                    renderIcons();
                }

                e.target.value = '';
            });
        });
    </script>

</body>
</html>
